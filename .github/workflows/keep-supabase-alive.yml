name: Keep Supabase Alive

on:
  schedule:
    # Runs every 6 days at 3:00 AM UTC
    - cron: '0 3 */6 * *'
  workflow_dispatch: # Expose manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Supabase via Netlify Function
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.PING_SECRET }}" \
            https://api-natly.netlify.app/.netlify/functions/ping)
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" != "200" ]; then
            echo "❌ Ping failed with status $http_code"
            exit 1
          fi
          
          echo "✅ Supabase keep-alive ping successful"