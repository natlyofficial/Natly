name: Deploy to Hostinger (FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        env:
            # Public keys (safe - from .env.production)
            VITE_SUPABASE_URL: https://etutawclisojjdxtuctk.supabase.co
            VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0dXRhd2NsaXNvampkeHR1Y3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjE5NTAsImV4cCI6MjA4ODM5Nzk1MH0.Gx1bywNSfxwuJMbwRv1cPQMDljowa-hHn1JLNCcCXP0
            VITE_API_URL: https://api-natly.netlify.app
            VITE_RECAPTCHA_SITE_KEY: 6LcxCyssAAAAANQIaK8EKDr_fh8rdjJbwQw8FPl7
            VITE_GA_MEASUREMENT_ID: G-09PP3594P5
            # Semi-private keys (from GitHub Secrets)
            VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
            VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
            VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
        run: npm run build

      - name: Copy .htaccess into dist
        run: |
          if [ -f .htaccess ]; then cp .htaccess dist/.htaccess; fi

      - name: Upload via FTP to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: dist/
          server-dir: /
          dangerous-clean-slate: true
